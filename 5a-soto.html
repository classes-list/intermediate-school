<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mary, Star of the Sea &mdash; 5th Grade A &middot; Ms. Soto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef2fa 0%, #f8f9fa 100%);
      color: #253a77;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 1000px; width: 100%; text-align: center; position: relative; }
    .back-index-btn {
      position: fixed;
      top: 20px; left: 20px;
      background: #253a77; color: #fff; text-decoration: none;
      padding: 10px 16px; border-radius: 8px;
      font-size: 14px; font-weight: 700;
      box-shadow: 0 3px 10px rgba(37,58,119,0.25);
      transition: all 0.18s; z-index: 10;
    }
    .back-index-btn:hover { background: #1a2a4a; transform: translateX(-2px); box-shadow: 0 5px 14px rgba(37,58,119,0.35); }
    .logo-wrap { margin-bottom: 20px; }
    .logos-row {
      display: flex; gap: 28px; align-items: center; justify-content: center; flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .logo-circle {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 6px 20px rgba(37,58,119,0.18);
      overflow: hidden;
      display: inline-flex; align-items: center; justify-content: flex-start;
      flex-shrink: 0;
    }
    .logo-circle img { display: block; }
    .logo-circle.msos img { height: 100%; width: auto; }
    .logo-circle.nui img { width: 100%; height: 100%; object-fit: cover; }
    .logo-circle.msos { background: #1a2a4a; }
    @media (max-width: 600px) { .logo-circle { width: 100px; height: 100px; } }
    .grade-badge {
      display: inline-block; background: linear-gradient(135deg, #FFD100 0%, #FFB800 100%);
      color: #253a77; padding: 6px 18px; border-radius: 999px;
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
      margin: 6px 0 10px; box-shadow: 0 2px 8px rgba(255, 209, 0, 0.35);
    }
    h1 { color: #253a77; font-size: 2.4rem; margin: 4px 0 8px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 22px; margin-top: 30px; }
    .card {
      background: #fff; border: 2px solid #253a77; border-radius: 14px;
      padding: 26px 18px; text-decoration: none; color: #253a77;
      transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(37, 58, 119, 0.08);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 190px; position: relative; overflow: hidden;
    }
    .card.active { cursor: pointer; }
    .card.active:hover { transform: translateY(-6px); box-shadow: 0 10px 28px rgba(37, 58, 119, 0.25); background: #253a77; color: #fff; }
    .card.active:hover .card-theme { color: #FFD100; }
    .card.active:hover .card-icon { transform: scale(1.1); }
    .card.coming { cursor: default; border-color: #cbd5e1; background: #f8fafc; color: #94a3b8; }
    .card.coming .card-icon { opacity: 0.6; }
    .card-icon { font-size: 2.8rem; line-height: 1; margin-bottom: 12px; transition: transform 0.2s ease; }
    .card-label { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; line-height: 1.25; }
    .card-theme { font-size: 0.82rem; opacity: 0.85; font-style: italic; transition: color 0.2s; margin-bottom: 8px; line-height: 1.3; }
    .card-status { display: inline-block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 14px; text-transform: uppercase; }
    .card.coming .card-status { background: #e2e8f0; color: #64748b; }
    .card.active .card-status { background: #FFD100; color: #1a2a4a; }
    .card.active:hover .card-status { background: #FFD100; color: #1a2a4a; }
    .card-wrap { display: flex; flex-direction: column; gap: 8px; }
    .syllabus-btn-card {
      display: block; text-align: center;
      background: #FFD100; color: #1a2a4a;
      text-decoration: none;
      padding: 9px 14px; border-radius: 8px;
      font-weight: 700; font-size: 0.85rem;
      border: 1.5px solid #d4ad00;
      transition: all 0.18s;
      box-shadow: 0 2px 6px rgba(212,173,0,0.25);
    }
    .syllabus-btn-card:hover {
      background: #1a2a4a; color: #FFD100; border-color: #1a2a4a; transform: translateY(-1px);
    }

    /* Teacher card — Dr. Park format */
    .teacher-card {
      margin: 36px auto 0;
      max-width: 640px;
      background: #fff;
      border-left: 4px solid #FFD100;
      padding: 22px 24px;
      text-align: left;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(37,58,119,0.10);
      display: flex; gap: 22px; align-items: center;
      flex-wrap: wrap;
    }
    .teacher-photo {
      flex: 0 0 120px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #1a2a4a;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(37,58,119,0.18);
      overflow: hidden;
      position: relative;
    }
    .teacher-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 25%;
      display: block;
    }
    .teacher-photo .initials {
      color: #FFD100;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .teacher-info { flex: 1 1 240px; }
    .teacher-name { color: #253a77; font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .teacher-role { color: #7a5f00; font-size: 0.9rem; font-style: italic; margin-bottom: 10px; }
    .teacher-meta { font-size: 0.92rem; color: #444; margin-bottom: 14px; line-height: 1.6; }
    .teacher-meta strong { color: #253a77; }
    .teacher-meta a { color: #253a77; text-decoration: none; }
    .teacher-meta a:hover { text-decoration: underline; }
    .about-btn {
      display: inline-block;
      background: #253a77; color: #fff; text-decoration: none;
      padding: 9px 18px; border-radius: 8px;
      font-weight: 700; font-size: 0.88rem;
      transition: all 0.18s;
      box-shadow: 0 2px 6px rgba(37,58,119,0.25);
    }
    .about-btn:hover {
      background: #1a2a4a; transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37,58,119,0.35);
    }
    .about-btn::after { content: " \2197"; font-weight: 600; }
    footer { margin-top: 40px; font-size: 0.85rem; color: #888; }
    @media (max-width: 600px) {
      h1 { font-size: 1.7rem; }
      .teacher-card { flex-direction: column; align-items: flex-start; text-align: left; }
      .teacher-photo { margin: 0 auto; }
      .teacher-info { text-align: center; width: 100%; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-index-btn" title="Back to Intermediate School Classrooms">&larr; All Classes</a>
  <div class="container">
    <div class="logo-wrap">
      <div class="logos-row">
        <span class="logo-circle msos" title="Mary, Star of the Sea"><img src="msos-logo.svg" alt="Mary, Star of the Sea Logo"></span>
        <span class="logo-circle nui" title="Nurture &middot; Unite &middot; Inspire"><img src="nui-logo.png" alt="Nurture-Unite-Inspire Logo"></span>
      </div>
    </div>
    <div class="grade-badge">5th Grade A</div>
    <h1>Ms. Soto's Class</h1>

    <div class="grid">
      <a class="card active" href="msos-math-5.html">
        <div class="card-icon">🧮</div>
        <div class="card-label">Math</div>
        <div class="card-theme">enVisionMATH 2.0 &middot; Grade 5</div>
        
      </a>

      <a class="card active" href="5a-soto-religion-resources.html">
        <div class="card-icon">✝️</div>
        <div class="card-label">Religion</div>
        <div class="card-theme">Catholic Faith Formation</div>
        <div class="card-status">Resources</div>
      </a>
    </div>

    <div class="teacher-card">
      <div class="teacher-photo">
        <img src="ms-soto.jpg" alt="Ms. Soto" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="initials" style="display:none; width:100%; height:100%; align-items:center; justify-content:center;">MS</div>
      </div>
      <div class="teacher-info">
        <div class="teacher-name">Ms. Soto</div>
        <div class="teacher-role">5th Grade A Teacher</div>
        <div class="teacher-meta">
          <strong>Email:</strong> <a href="mailto:asoto-gelacio@starofthesea.org">asoto-gelacio@starofthesea.org</a>
        </div>
        <a class="about-btn" href="ms-soto-bio.html" >About Ms. Soto</a>
      </div>
    </div>

    <footer>
      &copy; Mary, Star of the Sea School &middot; SY 2026-2027
    </footer>
  </div>
</body>
</html>
