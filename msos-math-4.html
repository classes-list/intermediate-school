const LESSONS = {
  "t01-place-value": "<h2>Place Value & Rounding</h2>\n<p>Every digit's value depends on where it sits in a number. Moving one place <strong>left</strong> makes its value <strong>10 times greater</strong>.</p>\n<p><strong>Place-value chart (example 3,452,678):</strong></p>\n<ul>\n  <li>3 — millions (3,000,000)</li>\n  <li>4 — hundred-thousands (400,000)</li>\n  <li>5 — ten-thousands (50,000)</li>\n  <li>2 — thousands (2,000)</li>\n  <li>6 — hundreds (600)</li>\n  <li>7 — tens (70)</li>\n  <li>8 — ones (8)</li>\n</ul>\n<p><strong>Expanded form:</strong> 3,452,678 = 3,000,000 + 400,000 + 50,000 + 2,000 + 600 + 70 + 8.</p>\n<p><strong>Rounding rule:</strong> Find the rounding place, then look at the digit to its <em>right</em>. If it's 5 or greater, round up; otherwise, round down.</p>\n<p><strong>Example:</strong> Round 47,582 to the nearest thousand. Thousands digit is 7; next digit is 5 → round up → <strong>48,000</strong>.</p>",
  "t02-add-sub-multi-digit": "<h2>Addition</h2>\n<p>The <strong>standard addition algorithm</strong> stacks numbers by place value, ones under ones, tens under tens.</p>\n<p><strong>Steps:</strong></p>\n<ol>\n  <li>Line up the place values (right-align).</li>\n  <li>Add each column starting from the ones place.</li>\n  <li>If a column totals 10 or more, <strong>carry</strong> 1 to the next column.</li>\n</ol>\n<p><strong>Example:</strong> 4,876 + 2,389</p>\n<pre>    1 1 1\n    4,876\n  + 2,389\n  --------\n    7,265</pre>\n<p><strong>Tip:</strong> Estimate first — round each number, add mentally. If your actual answer is close to the estimate, you likely didn't make a mistake.</p><h2>Subtraction</h2>\n<p>Subtraction finds the difference between two numbers. When the top digit is smaller than the bottom digit, <strong>regroup</strong> (borrow) from the next place.</p>\n<p><strong>Example:</strong> 5,002 − 1,347</p>\n<pre>    4 9 9 1\n    5,0 0 2\n  − 1,3 4 7\n  ---------\n    3,6 5 5</pre>\n<p>Walk through the regrouping: 2 ones can't give up 7, so borrow from tens. But tens are 0, so we borrow from hundreds — also 0 — all the way from thousands. The whole chain becomes 4-9-9-12.</p>\n<p><strong>Check your work:</strong> Add the answer to the subtrahend. 3,655 + 1,347 = 5,002 ✓</p>",
  "t03-multiply-1digit": "<h2>Mental Multiplication</h2>\n<p>Fluent multiplication means doing many products in your head using tricks:</p>\n<ul>\n  <li><strong>×10, ×100, ×1000:</strong> Just add the zeros. 56 × 100 = 5,600.</li>\n  <li><strong>×5 trick:</strong> Halve and multiply by 10. 48 × 5 = (48 ÷ 2) × 10 = 24 × 10 = 240.</li>\n  <li><strong>×9 trick:</strong> Multiply by 10, then subtract the number. 7 × 9 = 70 − 7 = 63.</li>\n  <li><strong>Breaking apart:</strong> 7 × 12 = 7 × 10 + 7 × 2 = 70 + 14 = 84.</li>\n  <li><strong>Doubling:</strong> ×4 = double twice; ×8 = double three times.</li>\n</ul>\n<p><strong>Example:</strong> 25 × 14 → 25 × 4 = 100, 25 × 10 = 250 → 100 + 250 = <strong>350</strong>.</p>",
  "t04-multiply-2digit": "<h2>Multiply in Columns</h2>\n<p>When a product is too big to do in your head, use the <strong>column algorithm</strong> (aka long multiplication).</p>\n<p><strong>Steps for 2-digit × 2-digit:</strong></p>\n<ol>\n  <li>Multiply the top number by the ones digit of the bottom number.</li>\n  <li>Write a 0 in the ones place of the next row (because the next digit is in tens).</li>\n  <li>Multiply the top number by the tens digit and write above that 0.</li>\n  <li>Add the two rows.</li>\n</ol>\n<p><strong>Example:</strong> 237 × 45</p>\n<pre>      237\n   ×   45\n   ------\n     1185    (237 × 5)\n     9480    (237 × 40)\n   ------\n    10,665</pre>\n<p><strong>Estimate check:</strong> 237 ≈ 240, 45 ≈ 50. 240 × 50 = 12,000. Our answer 10,665 is close enough.</p>",
  "t05-divide-1digit": "<h2>Mental Division</h2>\n<p>Fast division uses the times-tables in reverse plus useful tricks:</p>\n<ul>\n  <li><strong>÷10:</strong> Drop a zero (or shift decimal). 480 ÷ 10 = 48.</li>\n  <li><strong>Halving:</strong> ÷2 once = halve; ÷4 = halve twice; ÷8 = halve three times.</li>\n  <li><strong>Use factor pairs:</strong> 96 ÷ 6 = (96 ÷ 2) ÷ 3 = 48 ÷ 3 = 16.</li>\n  <li><strong>Divisibility rules:</strong> ÷2 if last digit even; ÷3 if digit sum ÷ 3; ÷5 if ends in 0 or 5; ÷10 if ends in 0.</li>\n</ul>\n<p><strong>Example:</strong> 720 ÷ 9 — think \"9 × what = 720?\" 9 × 80 = 720 → <strong>80</strong>.</p><h2>Long Division</h2>\n<p>Long division handles divisions we can't do in our head. The steps are <strong>Divide, Multiply, Subtract, Bring down</strong> (DMSB) — nicknamed \"Dad, Mom, Sister, Brother.\"</p>\n<p><strong>Example:</strong> 952 ÷ 7</p>\n<pre>       1 3 6\n     ________\n  7 | 9 5 2\n      7\n      ---\n      2 5\n      2 1\n      ---\n        4 2\n        4 2\n        ---\n           0    (remainder 0)</pre>\n<p><strong>Answer:</strong> 952 ÷ 7 = 136 remainder 0.</p>\n<p><strong>With a remainder:</strong> 953 ÷ 7 = 136 R 1 (since 953 − 952 = 1).</p>",
  "t06-operations-word-problems": "<h2>Order of Operations</h2>\n<p>When you see an expression with multiple operations, follow this order:</p>\n<ol>\n  <li><strong>P</strong>arentheses (or brackets) first</li>\n  <li><strong>E</strong>xponents (powers)</li>\n  <li><strong>M</strong>ultiplication and <strong>D</strong>ivision, left to right</li>\n  <li><strong>A</strong>ddition and <strong>S</strong>ubtraction, left to right</li>\n</ol>\n<p><em>Memorize:</em> \"Please Excuse My Dear Aunt Sally\" (PEMDAS).</p>\n<p><strong>Example:</strong> 6 + 2 × (3 + 4)</p>\n<ul>\n  <li>Parentheses: (3 + 4) = 7 → 6 + 2 × 7</li>\n  <li>Multiplication: 2 × 7 = 14 → 6 + 14</li>\n  <li>Addition: 6 + 14 = <strong>20</strong></li>\n</ul>\n<p><strong>Without parentheses:</strong> 6 + 2 × 3 + 4 would be 6 + 6 + 4 = 16. The parentheses change the answer!</p><h2>Word Problems</h2>\n<p>A word problem describes a real situation in sentences. Your job: translate into math, solve, and check.</p>\n<p><strong>Four-step plan:</strong></p>\n<ol>\n  <li><strong>Understand:</strong> What is being asked? Highlight the question.</li>\n  <li><strong>Plan:</strong> What operation(s) fit? (+ − × ÷)</li>\n  <li><strong>Solve:</strong> Write the equation and calculate.</li>\n  <li><strong>Check:</strong> Does the answer make sense? Estimate to compare.</li>\n</ol>\n<p><strong>Example:</strong> A class plants 6 rows of corn with 18 stalks each. Birds eat 15 stalks. How many are left?</p>\n<ul>\n  <li>Step 1 — ask: \"How many stalks remain?\"</li>\n  <li>Step 2 — plan: multiply, then subtract.</li>\n  <li>Step 3 — solve: 6 × 18 = 108; 108 − 15 = <strong>93</strong>.</li>\n  <li>Step 4 — check: 93 + 15 = 108 = 6 × 18 ✓</li>\n</ul>\n<p><strong>Interpret remainders:</strong> If 27 cookies are split among 4 friends, 27 ÷ 4 = 6 R 3. Each friend gets 6 cookies; 3 are left over.</p>",
  "t07-factors-multiples": "<h2>Factoring</h2>\n<p>A <strong>factor</strong> divides a number evenly. A <strong>multiple</strong> is the result of multiplying.</p>\n<p><strong>Factors of 12:</strong> 1, 2, 3, 4, 6, 12.</p>\n<p><strong>Multiples of 6:</strong> 6, 12, 18, 24, 30, 36, …</p>\n<p><strong>Prime numbers</strong> have exactly two factors (1 and themselves). Examples: 2, 3, 5, 7, 11, 13, 17, 19, 23.</p>\n<p><strong>Composite numbers</strong> have more than two factors: 4, 6, 8, 9, 10, 12, …</p>\n<p><strong>1 is neither prime nor composite.</strong></p>\n<p><strong>Factor pairs of 24:</strong> 1 × 24, 2 × 12, 3 × 8, 4 × 6.</p>\n<p><strong>Prime factorization:</strong> Break a number into a product of primes.</p>\n<ul>\n  <li>24 = 2 × 12 = 2 × 2 × 6 = 2 × 2 × 2 × 3 = <strong>2³ × 3</strong></li>\n  <li>45 = 3 × 15 = 3 × 3 × 5 = <strong>3² × 5</strong></li>\n</ul>",
  "t08-10-fractions": "<h2>Fractions</h2>\n<p>A <strong>fraction</strong> shows a part of a whole. The top number (numerator) counts the parts you have; the bottom number (denominator) tells how many equal parts make the whole.</p>\n<p><strong>Equivalent fractions:</strong> Multiply or divide the top and bottom by the same number. 1/2 = 2/4 = 3/6 = 4/8.</p>\n<p><strong>Comparing fractions:</strong></p>\n<ul>\n  <li>Same denominator: compare numerators. 3/5 &lt; 4/5.</li>\n  <li>Different denominators: find a common denominator first. Is 2/3 bigger than 3/5? Common denominator 15: 2/3 = 10/15, 3/5 = 9/15. So 2/3 &gt; 3/5.</li>\n</ul>\n<p><strong>Adding fractions with like denominators:</strong> Add the numerators only — keep the denominator the same.</p>\n<p><strong>Example:</strong> 2/7 + 3/7 = <strong>5/7</strong>.</p>\n<p><strong>Mixed numbers:</strong> 1 whole + 3/4 is written as 1 3/4. You can convert to improper: 1 3/4 = 7/4.</p>",
  "t11-data-line-plots": "<h2>Data & Graphing</h2>\n<p>Data are answers to questions — height, temperature, number of petals, etc. We use graphs to <em>see</em> patterns quickly.</p>\n<p><strong>Line plot:</strong> A number line where each data point is an X above its value. Great for small numbers of measurements.</p>\n<p><strong>Bar graph:</strong> Shows amount for each category. Bars can be vertical or horizontal. Always label axes.</p>\n<p><strong>Pictograph:</strong> Each picture represents a count (the key tells you how many).</p>\n<p><strong>Reading graphs — questions to ask:</strong></p>\n<ul>\n  <li>Which category has the most? the least?</li>\n  <li>How many more does X have than Y?</li>\n  <li>What's the total?</li>\n</ul>\n<p><strong>Mean (average):</strong> Sum all data, divide by count. Example: (3 + 5 + 7 + 9) ÷ 4 = 6.</p>\n<p><strong>Range:</strong> largest − smallest = spread of the data.</p>",
  "t12-decimals": "<h2>Decimals</h2>\n<p>A <strong>decimal</strong> is another way to write fractions whose denominators are 10, 100, 1000, etc.</p>\n<ul>\n  <li>0.1 means 1/10 (one tenth)</li>\n  <li>0.01 means 1/100 (one hundredth)</li>\n  <li>0.75 means 75/100 = 3/4</li>\n</ul>\n<p><strong>Reading decimals:</strong> 2.54 is \"two and fifty-four hundredths.\"</p>\n<p><strong>Comparing decimals:</strong> Line up the decimal points and compare digits left-to-right. 0.52 &lt; 0.6 because the tenths digit (5 vs 6) decides it.</p>\n<p><strong>Fraction ↔ Decimal:</strong></p>\n<ul>\n  <li>1/2 = 0.5</li>\n  <li>1/4 = 0.25</li>\n  <li>3/4 = 0.75</li>\n  <li>1/10 = 0.1</li>\n</ul>\n<p><strong>Tip:</strong> To convert a fraction like 3/8 into a decimal, divide: 3 ÷ 8 = 0.375.</p>",
  "t13-measurement": "<h2>Measurement</h2>\n<p><strong>Customary (U.S.) units:</strong></p>\n<ul>\n  <li>Length: 12 in = 1 ft, 3 ft = 1 yd, 5,280 ft = 1 mi</li>\n  <li>Weight: 16 oz = 1 lb, 2,000 lb = 1 ton</li>\n  <li>Capacity: 8 fl oz = 1 c, 2 c = 1 pt, 2 pt = 1 qt, 4 qt = 1 gal</li>\n</ul>\n<p><strong>Metric units (base-10 friendly):</strong></p>\n<ul>\n  <li>Length: 10 mm = 1 cm, 100 cm = 1 m, 1,000 m = 1 km</li>\n  <li>Mass: 1,000 g = 1 kg</li>\n  <li>Capacity: 1,000 mL = 1 L</li>\n</ul>\n<p><strong>Area of a rectangle:</strong> A = length × width. Example: 6 ft × 4 ft = 24 sq ft.</p>\n<p><strong>Perimeter of a rectangle:</strong> P = 2(length + width). Example: 2(6 + 4) = 20 ft.</p><h2>Perimeter &amp; Area</h2>\n<p><strong>Perimeter</strong> is the distance <em>around</em> a shape. <strong>Area</strong> is the amount of space <em>inside</em>.</p>\n<h3>🔁 Perimeter — add up all the sides</h3>\n<p>For any shape: walk all the way around and add the side lengths.</p>\n<ul>\n  <li><strong>Rectangle:</strong> P = 2 &times; (length + width)</li>\n  <li><strong>Square:</strong> P = 4 &times; side</li>\n  <li><strong>Triangle / any polygon:</strong> add every side.</li>\n</ul>\n<p>Units stay the same as the side units: m, cm, ft, in.</p>\n<h3>🟦 Area — cover the inside</h3>\n<ul>\n  <li><strong>Rectangle:</strong> A = length &times; width</li>\n  <li><strong>Square:</strong> A = side &times; side</li>\n</ul>\n<p>Units are <strong>SQUARE</strong> units: m&sup2;, cm&sup2;, ft&sup2;, in&sup2;. Why squared? You're counting unit-squares that fit inside.</p>\n<h3>Real-world clues — which one do I use?</h3>\n<ul>\n  <li>Building a <strong>fence</strong>? Perimeter.</li>\n  <li>Laying <strong>carpet</strong> or <strong>tile</strong>? Area.</li>\n  <li><strong>Painting</strong> a wall? Area.</li>\n  <li><strong>Trim</strong> around a picture frame? Perimeter.</li>\n  <li><strong>Sod</strong> for a lawn? Area.</li>\n  <li><strong>Ribbon</strong> around a box? Perimeter.</li>\n</ul>\n<h3>💡 Worked example — 9 m by 5 m rectangle</h3>\n<ul>\n  <li>Perimeter: P = 2 &times; (9 + 5) = 2 &times; 14 = <strong>28 m</strong></li>\n  <li>Area: A = 9 &times; 5 = <strong>45 m&sup2;</strong></li>\n</ul>\n<h3>📐 Composite figures (L-shape)</h3>\n<p>For an <strong>L-shape</strong>, split it into two rectangles. Find each area, then ADD. For perimeter, walk around the outside and add every edge.</p>\n<p><strong>Example L-shape:</strong> a 10&times;4 rectangle on top of a 6&times;4 rectangle.</p>\n<ul>\n  <li>Top: 10 &times; 4 = 40</li>\n  <li>Bottom: 6 &times; 4 = 24</li>\n  <li>Total area: 40 + 24 = <strong>64 sq units</strong></li>\n</ul>\n<h3>🔄 Working backwards</h3>\n<p>If you know area and one side, divide to find the other side.</p>\n<p><strong>Example:</strong> Area = 72 m&sup2;, length = 9 m. Width = 72 &divide; 9 = <strong>8 m</strong>.</p>\n<h3>⚠ Common mistakes</h3>\n<ul>\n  <li>Mixing up perimeter and area — perimeter is a length (m), area is squared (m&sup2;).</li>\n  <li>Forgetting to convert units so they match before computing.</li>\n  <li>Confusing 2(L + W) with 2L + W &mdash; use parentheses!</li>\n</ul>",
  "t14-patterns": "<h2>📈 Topic 14: Generate &amp; Analyze Patterns</h2><h3>What is a pattern?</h3><p>A <strong>pattern</strong> is a repeating or growing sequence made by following a rule. Patterns can be numbers, shapes, or both.</p><h3>Number patterns</h3><p>Given a rule such as <em>&ldquo;add 3&rdquo;</em> and a starting number of 2, generate: 2, 5, 8, 11, 14, ... Each term follows the rule.</p><p>Given a rule <em>&ldquo;multiply by 2&rdquo;</em> and a starting number of 1: 1, 2, 4, 8, 16, 32, ...</p><h3>Analyzing patterns</h3><p>Look for features the rule does not tell you directly. Example: <em>&ldquo;add 3&rdquo;</em> starting at 2 gives every term as odd. Example: <em>&ldquo;add 5&rdquo;</em> gives terms alternating between ones-digit 0 and 5.</p><h3>Shape patterns</h3><p>Draw a triangle, then square, then pentagon, then hexagon, ... The number of sides grows by 1 each step.</p><h3>Input-Output Tables</h3><p>Use a two-column table to organize a rule. If the rule is <em>y = 2 &times; x + 1</em>:</p><table style='border-collapse:collapse;margin:8px 0'><tr><th style='border:1px solid #999;padding:4px 10px'>x</th><th style='border:1px solid #999;padding:4px 10px'>y</th></tr><tr><td style='border:1px solid #999;padding:4px 10px'>1</td><td style='border:1px solid #999;padding:4px 10px'>3</td></tr><tr><td style='border:1px solid #999;padding:4px 10px'>2</td><td style='border:1px solid #999;padding:4px 10px'>5</td></tr><tr><td style='border:1px solid #999;padding:4px 10px'>3</td><td style='border:1px solid #999;padding:4px 10px'>7</td></tr><tr><td style='border:1px solid #999;padding:4px 10px'>4</td><td style='border:1px solid #999;padding:4px 10px'>9</td></tr></table><h3>Common Core</h3><p><strong>4.OA.C.5</strong> &mdash; Generate a number or shape pattern that follows a given rule. Identify apparent features of the pattern that were not explicit in the rule.</p>",
  "t15-16-angles-shapes": "<h2>Geometry</h2>\n<p><strong>Building blocks:</strong></p>\n<ul>\n  <li>A <strong>point</strong> is a location.</li>\n  <li>A <strong>line</strong> goes forever in both directions.</li>\n  <li>A <strong>line segment</strong> has two endpoints.</li>\n  <li>A <strong>ray</strong> starts at one point and goes on forever in one direction.</li>\n  <li>An <strong>angle</strong> is formed where two rays share an endpoint.</li>\n</ul>\n<p><strong>Angle types:</strong> right (90°), acute (&lt; 90°), obtuse (between 90° and 180°), straight (180°).</p>\n<p><strong>Triangles by angles:</strong> acute (all &lt; 90°), right (one = 90°), obtuse (one &gt; 90°).</p>\n<p><strong>Triangles by sides:</strong> equilateral (all equal), isosceles (2 equal), scalene (none equal).</p>\n<p><strong>Symmetry:</strong> A shape has <em>line symmetry</em> if you can fold it so the two halves match. A square has 4 lines of symmetry; an equilateral triangle has 3.</p>"
};

      if (r.type === 'phet') return `<a class="btn-phet" href="${r.url}" target="_blank" rel="noopener">🧪 PhET ${r.name}</a>`;
      if (r.type === 'game') return `<a class="btn-game" href="${r.url}" target="_blank" rel="noopener">${r.emoji || '🎮'} ${r.name}</a>`;
      return '';
    }).join('');
  } else {
    // Backward-compat: legacy phetUrl / phetSims / games fields
    const phetSims = unit.phetSims || (unit.phetUrl ? [{ name: 'Simulation', url: unit.phetUrl }] : []);
    btns += phetSims.map(s => `<a class="btn-phet" href="${s.url}" target="_blank" rel="noopener">🧪 PhET ${s.name}</a>`).join('');
    btns += (unit.games || []).map(g => `<a class="btn-game" href="${g.url}" target="_blank" rel="noopener">${g.emoji || '🎮'} ${g.name}</a>`).join('');
  }

  const ytBtn = `<a class="btn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(unit.ytSearch)}" target="_blank">▶️ YouTube</a>`;
  const ixlBtn = unit.ixlUrl ? `<a class="btn-ixl" href="${unit.ixlUrl}" target="_blank" rel="noopener">📚 IXL Practice</a>` : '';
  return `<div class="resource-card"><h3>📚 Resources</h3><div class="resource-btns">${btns}${ixlBtn}${ytBtn}</div></div>`;
}

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => showLesson(unit.id);
    card.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-card-icon">${unit.icon}</div>
        <div class="unit-card-meta">
          <div class="unit-card-title">${unit.title}${completedUnits[unit.id]?' ✅':''}</div>
          <div class="unit-card-cc">${unit.cc}</div>
        </div>
      </div>
      <div class="unit-card-desc">${unit.desc}</div>
      <div class="unit-card-pills">
        <div class="pill">📖 Lesson</div>
        <div class="pill">📋 Worksheet</div>
        <div class="pill">▶️ YouTube</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-content');
  sidebar.innerHTML = '';
  const Q_MAP = { 't01-place-value': 1, 't02-add-sub-multi-digit': 1, 't03-multiply-1digit': 1, 't04-multiply-2digit': 1, 't05-divide-1digit': 2, 't06-operations-word-problems': 2, 't07-factors-multiples': 2, 't08-10-fractions': 3, 't11-data-line-plots': 3, 't12-decimals': 3, 't13-measurement': 4, 't14-patterns': 4, 't15-16-angles-shapes': 4 };
  const Q_LABELS = { 1: 'Q1 · Whole-Number Operations', 2: 'Q2 · Division · Word Problems · Factors', 3: 'Q3 · Fractions · Data · Decimals', 4: 'Q4 · Measurement · Patterns · Geometry' };
  let lastQ = 0;
  UNITS.forEach((unit, idx) => {
    const q = Q_MAP[unit.id] || 0;
    if (q !== lastQ && Q_LABELS[q]) {
      const hdr = document.createElement('div');
      hdr.className = 'sidebar-quarter';
      hdr.textContent = Q_LABELS[q];
      sidebar.appendChild(hdr);
      lastQ = q;
    }
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentUnit === unit.id ? ' active' : '');
    item.textContent = `${idx + 1}. ${unit.title}${completedUnits[unit.id]?' ✅':''}`;
    item.onclick = () => showLesson(unit.id);
    sidebar.appendChild(item);
  });
}

function setTopbar() {
  document.getElementById('topbar-title').textContent = currentUnit ? UNITS.find(u => u.id === currentUnit).title : 'Exploring the World with Math';
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  currentUnit = null;
  renderHome();
  renderSidebar();
  setTopbar();
}

function showLesson(unitId) {
  currentUnit = unitId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById('lesson-content').innerHTML = LESSONS[unitId] + resourceCardHTML(unit);
  renderSidebar();
  setTopbar();
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    const userAns = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${userAns || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const quiz = QUIZZES[currentUnit];
  let html = '';
  quiz.forEach((q, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${q.q}</p>`;
    q.opts.forEach((opt, optIdx) => {
      html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

function submitQuiz() {
  const quiz = QUIZZES[currentUnit];
  let score = 0;
  quiz.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    if (selected && parseInt(selected.value) === q.ans) score++;
  });
  const percent = Math.round((score / quiz.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');
  document.getElementById('cert-content').innerHTML = `<p style="font-size: 24px; margin: 20px;">Quiz Score: ${score}/${quiz.length} (${percent}%)</p><p>Congratulations on completing this unit!</p>`;
  renderSidebar();
  updateProgress();
}

function updateProgress() {
  const completed = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = `${completed}/${UNITS.length}`;
}

function showHandout() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('handout-screen').classList.add('active');
  const h = HANDOUTS_4[currentUnit];
  if (!h) {
    document.getElementById('handout-content').innerHTML = '<p>No handout available for this unit.</p>';
    return;
  }
  const stepsHtml = h.steps.map(s => `<li>${s}</li>`).join('');
  const reflectHtml = h.reflect.map((r,i) => `<li>${r}</li>`).join('');
  const answers = ANSWERS_4[currentUnit];
  const answerKeyHtml = answers ? `
      <details style="background:#E8F5E9;border:2px solid #2E7D32;border-radius:8px;padding:14px 18px;margin:14px 0;">
        <summary style="cursor:pointer;font-weight:700;color:#1B3A8A;font-size:1.05rem;">📗 Show Answer Key (click to expand)</summary>
        <ol style="margin-top:12px;padding-left:22px;line-height:1.6;">
          ${answers.map(a => `<li style="margin-bottom:8px;color:#1B3A8A;"><span style="background:#fff;padding:3px 8px;border-radius:4px;border:1px solid #94A3B8;">${a}</span></li>`).join('')}
        </ol>
        <div style="font-size:0.85rem;color:#555;margin-top:10px;font-style:italic;">Work through each step first, then click to compare your answers.</div>
      </details>` : '';
  document.getElementById('handout-content').innerHTML = `
    <div class="handout-card">
      <h3>${h.title}</h3>
      <div class="handout-science">${h.science}</div>
      <div class="handout-mission">${h.mission}</div>
      <p><strong>📋 Step-by-Step Instructions</strong></p>
      <ol class="handout-steps">${stepsHtml}</ol>
      <div class="handout-deliverable">
        <strong>🎯 What to Submit:</strong>
        ${h.deliverable}
      </div>
      ${answerKeyHtml}
      <div class="handout-reflect">
        <strong>💭 Reflection Questions:</strong>
        <ol>${reflectHtml}</ol>
      </div>
    </div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  renderHome();
  renderSidebar();
});
  </script>
</body>
</html>
